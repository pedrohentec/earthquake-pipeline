version: 2

models:
  - name: silver_earthquakes_unified
    description: "Cleaned and unified earthquake events from USGS and USP/IAG"
    columns:
      - name: id
        description: "Unique earthquake identifier per extraction"
        data_tests:
          - not_null
      - name: source
        description: "Data source: USGS or USP"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['USGS', 'USP']
      - name: magnitude
        description: "Earthquake magnitude"
        data_tests:
          - not_null
      - name: latitude
        description: "Latitude coordinate"
        data_tests:
          - not_null
      - name: longitude
        description: "Longitude coordinate"
        data_tests:
          - not_null
      - name: magnitude_class
        description: "Magnitude classification"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['micro', 'minor', 'moderate', 'strong', 'major', 'great']
      - name: depth_class
        description: "Depth classification"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['shallow', 'intermediate', 'deep']